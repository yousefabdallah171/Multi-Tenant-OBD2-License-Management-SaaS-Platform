name: Security Hardening

on:
  pull_request:
    branches: [dev, master]
  push:
    branches: [dev, master]
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

jobs:
  php-security:
    name: PHP Security Checks
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: license_test
          MYSQL_ROOT_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      APP_ENV: testing
      APP_DEBUG: false
      APP_URL: http://127.0.0.1:8000
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: license_test
      DB_USERNAME: root
      DB_PASSWORD: secret
      CACHE_STORE: redis
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      MAIL_MAILER: array
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          extensions: mbstring, intl, pdo_mysql, redis, bcmath, sqlite3

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Prepare backend environment
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
          php artisan config:clear --ansi

      - name: Audit sensitive route middleware
        working-directory: backend
        run: composer security:routes

      - name: Run PHPStan / Larastan
        working-directory: backend
        run: composer analyse

      - name: Run backend security regression suite
        working-directory: backend
        run: composer test:security

      - name: Composer audit
        working-directory: backend
        run: composer audit --locked --format=plain

  semgrep:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep

      - name: Run Semgrep
        run: >
          semgrep scan
          --metrics=off
          --error
          --config p/php
          --config p/owasp-top-ten
          --config .semgrep/security.yml
          backend/app
          backend/routes

  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Composer audit
        working-directory: backend
        run: composer audit --locked --format=plain

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

      - name: Run OWASP Dependency-Check
        id: dependency-check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "LIcense"
          path: "backend"
          format: "HTML"
          out: "reports"
          args: >
            --scan /github/workspace/frontend/package-lock.json
            --failOnCVSS 7
            --enableRetired

      - name: Upload dependency-check report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: ${{ github.workspace }}/reports

  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          extensions: mbstring, intl, sqlite3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Prepare local app for DAST
        working-directory: backend
        env:
          APP_ENV: testing
          APP_DEBUG: false
          APP_URL: http://127.0.0.1:8000
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/backend/database/database.sqlite
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate --ansi
          php artisan migrate --force --ansi

      - name: Start backend server
        working-directory: backend
        env:
          APP_ENV: testing
          APP_DEBUG: false
          APP_URL: http://127.0.0.1:8000
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/backend/database/database.sqlite
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: php artisan serve --host=127.0.0.1 --port=8000 > /tmp/license-backend.log 2>&1 &

      - name: Build and preview frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:8000/api
          VITE_DEFAULT_LOCALE: ar
        run: |
          npm ci
          npm run build
          npx vite preview --host 127.0.0.1 --port 4173 > /tmp/license-frontend.log 2>&1 &

      - name: Wait for local targets
        run: npx --yes wait-on http://127.0.0.1:8000/api/health http://127.0.0.1:4173

      - name: Run ZAP baseline
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://127.0.0.1:4173"
          cmd_options: "-a"
          allow_issue_writing: false
          fail_action: false
          artifact_name: zap-baseline-report
