name: Test and Deploy

on:
  push:
    branches: [dev, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-prod:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: license_test
          MYSQL_ROOT_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          extensions: mbstring, intl, pdo_mysql, redis, bcmath

      - name: Install backend dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Prepare backend env
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          APP_ENV: testing
          APP_DEBUG: false
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: license_test
          DB_USERNAME: root
          DB_PASSWORD: secret
          CACHE_STORE: redis
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

      - name: Run backend tests
        working-directory: backend
        run: php artisan test
        env:
          APP_ENV: testing
          APP_DEBUG: false
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: license_test
          DB_USERNAME: root
          DB_PASSWORD: secret
          CACHE_STORE: redis
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            tests-frontend/package-lock.json

      - name: Run frontend unit tests
        working-directory: tests-frontend
        run: |
          npm ci
          npm run test:unit -- --watchAll=false

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
          if find dist -name "*.test.*" | grep -q .; then
            echo "Test files found in dist output"
            exit 1
          fi

  deploy-dev:
    runs-on: [self-hosted, Linux, X64]
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Deploy dev locally on VPS runner
        run: |
          set -e
          cd /home/obd2sw-panel/htdocs/panel.obd2sw.com
          git fetch origin
          git checkout dev
          git pull origin dev

          cd backend
          composer install --no-dev --optimize-autoloader --no-interaction
          php artisan migrate --force
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan queue:restart

          cd ../frontend
          npm ci
          npm run build

  deploy-prod:
    needs: test-prod
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy production over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/obd2sw
            git fetch origin
            git checkout master
            git pull origin master
            rm -rf tests-frontend

            cd backend
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan queue:restart

            cd ../frontend
            npm ci
            npm run build

            sudo systemctl reload nginx
            sudo supervisorctl restart obd2sw-worker:*
